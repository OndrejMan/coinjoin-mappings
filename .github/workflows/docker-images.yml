name: Build and Push Docker Images to GHCR

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "cj_mapping_enumerator/**"
      - "Sake/**"
      - "Dockerfile.enumerator"
      - "Dockerfile.sake"
      - ".dockerignore"
      - ".github/workflows/docker-images.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: coinjoin-mappings-enumerator
            dockerfile: Dockerfile.enumerator
          - name: coinjoin-mappings-sake
            dockerfile: Dockerfile.sake

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${{ matrix.image.name }}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
